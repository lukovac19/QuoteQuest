<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quilora – Coming Soon</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #000000;
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        overflow: hidden;
      }

      /* Subtle grid background */
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 100px 100px;
        pointer-events: none;
      }

      /* Radial gradient overlay */
      body::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.8) 100%);
        pointer-events: none;
      }

      .container {
        position: relative;
        z-index: 10;
        text-align: center;
        max-width: 800px;
        width: 100%;
        animation: fadeIn 1.2s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Logo */
      .logo {
        font-size: clamp(3.5rem, 10vw, 7rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        margin-bottom: 2rem;
        color: #ffffff;
        text-transform: uppercase;
      }

      /* Subtitle */
      .subtitle {
        font-size: clamp(1.125rem, 2vw, 1.5rem);
        font-weight: 500;
        color: #ffffff;
        margin-bottom: 1.5rem;
        letter-spacing: 0;
      }

      /* Description */
      .description {
        font-size: clamp(0.875rem, 1.5vw, 1rem);
        font-weight: 400;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 3rem;
        line-height: 1.6;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }

      /* Loading bar */
      .loading-container {
        width: 100%;
        max-width: 400px;
        margin: 0 auto 3rem;
      }

      .loading-bar {
        width: 100%;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
      }

      .loading-progress {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, transparent, #ffffff, transparent);
        animation: loading 2s ease-in-out infinite;
      }

      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }

      /* Email form */
      .email-form {
        margin-bottom: 4rem;
        max-width: 450px;
        margin-left: auto;
        margin-right: auto;
      }

      .email-wrapper {
        display: flex;
        gap: 0;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 0;
        overflow: hidden;
        transition: border-color 0.3s ease;
      }

      .email-wrapper:focus-within {
        border-color: rgba(255, 255, 255, 0.4);
      }

      .email-input {
        flex: 1;
        padding: 1rem 1.25rem;
        background: transparent;
        border: none;
        color: #ffffff;
        font-size: 0.9375rem;
        font-family: 'Inter', sans-serif;
        outline: none;
      }

      .email-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      .email-button {
        padding: 1rem 2rem;
        background: #ffffff;
        color: #000000;
        border: none;
        font-size: 0.9375rem;
        font-weight: 500;
        font-family: 'Inter', sans-serif;
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
      }

      .email-button:hover {
        background: rgba(255, 255, 255, 0.9);
      }

      .email-button:active {
        transform: scale(0.98);
      }

      /* Footer */
      .footer {
        position: absolute;
        bottom: 2rem;
        font-size: 0.8125rem;
        color: rgba(255, 255, 255, 0.3);
        font-weight: 400;
        letter-spacing: 0.1em;
      }

      /* Responsive */
      @media (max-width: 640px) {
        body {
          padding: 1.5rem;
        }

        .logo {
          margin-bottom: 1.5rem;
        }

        .subtitle {
          margin-bottom: 1rem;
        }

        .description {
          margin-bottom: 2rem;
        }

        .loading-container {
          margin-bottom: 2rem;
        }

        .email-form {
          margin-bottom: 3rem;
        }

        .email-wrapper {
          flex-direction: column;
        }

        .email-button {
          width: 100%;
        }

        .footer {
          bottom: 1.5rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1 class="logo">Quilora</h1>
      
      <p class="subtitle">A new version is coming soon</p>
      
      <p class="description">
        Quote Quest is evolving into Quilora. Launching April 1st.
      </p>

      <div class="loading-container">
        <div class="loading-bar">
          <div class="loading-progress"></div>
        </div>
      </div>
    </div>

    <footer class="footer">
      © QUILORA
    </footer>
  </body>
</html>
