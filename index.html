<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quilora – Coming Soon</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0a1929; /* 30% - dark background */
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        overflow: hidden;
      }

      /* Subtle pattern overlay */
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(38, 107, 167, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(38, 107, 167, 0.03) 1px, transparent 1px);
        background-size: 80px 80px;
        pointer-events: none;
      }

      /* Vignette effect */
      body::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 40%, rgba(10, 25, 41, 0.5) 100%);
        pointer-events: none;
      }

      .container {
        position: relative;
        z-index: 10;
        text-align: center;
        max-width: 900px;
        width: 100%;
        background: transparent;
        padding: 4rem 3rem;
        animation: fadeIn 1.2s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Logo */
      .logo {
        font-size: clamp(3.5rem, 10vw, 7rem);
        font-weight: 700;
        letter-spacing: 0.1em;
        margin-bottom: 2rem;
        background: linear-gradient(135deg, #266ba7 0%, #ffffff 100%); /* 60% + 10% */
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-transform: uppercase;
      }

      /* Subtitle */
      .subtitle {
        font-size: clamp(1.125rem, 2vw, 1.5rem);
        font-weight: 500;
        color: #266ba7; /* 60% - dominant color */
        margin-bottom: 1.5rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      /* Description */
      .description {
        font-size: clamp(0.875rem, 1.5vw, 1rem);
        font-weight: 400;
        color: #ffffff; /* 10% - accent color */
        opacity: 0.7;
        margin-bottom: 3rem;
        line-height: 1.8;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }

      /* Loading bar */
      .loading-container {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
      }

      .loading-bar {
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.1); /* 10% - accent color */
        position: relative;
        overflow: hidden;
      }

      .loading-progress {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 50%;
        background: linear-gradient(90deg, transparent, #ffffff, transparent); /* 10% - accent color */
        animation: loading 2.5s ease-in-out infinite;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      }

      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }

      /* Footer - outside the box */
      .footer {
        position: absolute;
        bottom: 2rem;
        font-size: 0.8125rem;
        color: #ffffff; /* 10% - accent color */
        font-weight: 400;
        letter-spacing: 0.1em;
        opacity: 0.6;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .container {
          padding: 3rem 2rem;
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 1.5rem;
        }

        .container {
          padding: 2.5rem 1.5rem;
        }

        .logo {
          margin-bottom: 1.5rem;
        }

        .subtitle {
          margin-bottom: 1rem;
        }

        .description {
          margin-bottom: 2rem;
        }

        .footer {
          bottom: 1.5rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1 class="logo">QUILORA</h1>
      
      <p class="subtitle">Coming Soon</p>
      
      <p class="description">
        QuoteQuest is evolving into Quilora. Launching April 13th.
      </p>

      <div class="loading-container">
        <div class="loading-bar">
          <div class="loading-progress"></div>
        </div>
      </div>
    </div>

    <footer class="footer">
      © QUILORA
    </footer>
  </body>
</html>
