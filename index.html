<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quilora – Coming Soon</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, #0B2D5A 0%, #051525 50%, #0B2D5A 100%);
        color: #49C1F3;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        overflow: hidden;
      }

      /* Subtle grid background */
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(37, 148, 217, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(37, 148, 217, 0.05) 1px, transparent 1px);
        background-size: 100px 100px;
        pointer-events: none;
      }

      /* Radial gradient overlay */
      body::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 0%, rgba(5, 21, 37, 0.95) 100%);
        pointer-events: none;
      }

      /* Glow orb */
      .glow-orb {
        position: absolute;
        width: 1000px;
        height: 1000px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(37, 148, 217, 0.1) 0%, transparent 60%);
        animation: orb-pulse 4s ease-in-out infinite;
        pointer-events: none;
        z-index: 1;
      }

      @keyframes orb-pulse {
        0%, 100% { 
          opacity: 0.3; 
          transform: translate(-50%, -50%) scale(0.9);
        }
        50% { 
          opacity: 0.6; 
          transform: translate(-50%, -50%) scale(1.1);
        }
      }

      .container {
        position: relative;
        z-index: 10;
        text-align: center;
        max-width: 800px;
        width: 100%;
        animation: fadeIn 1.2s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Logo */
      .logo {
        font-size: clamp(3.5rem, 10vw, 7rem);
        font-weight: 700;
        letter-spacing: 0.1em;
        margin-bottom: 2rem;
        background: linear-gradient(135deg, #2594D9 0%, #49C1F3 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-transform: uppercase;
      }

      /* Subtitle */
      .subtitle {
        font-size: clamp(1.125rem, 2vw, 1.5rem);
        font-weight: 500;
        color: #2594D9;
        margin-bottom: 1.5rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        animation: fade-in 2s ease-out;
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* Description */
      .description {
        font-size: clamp(0.875rem, 1.5vw, 1rem);
        font-weight: 400;
        color: #49C1F3;
        opacity: 0.6;
        margin-bottom: 3rem;
        line-height: 1.6;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }

      /* Loading bar */
      .loading-container {
        width: 100%;
        max-width: 400px;
        margin: 0 auto 3rem;
      }

      .loading-bar {
        width: 100%;
        height: 3px;
        background: rgba(37, 148, 217, 0.15);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 15px rgba(37, 148, 217, 0.2);
      }

      .loading-progress {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 50%;
        background: linear-gradient(90deg, transparent, #49C1F3, transparent);
        animation: loading 2.5s ease-in-out infinite;
        box-shadow: 0 0 30px rgba(73, 193, 243, 0.8);
      }

      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }

      /* Footer */
      .footer {
        position: absolute;
        bottom: 2rem;
        font-size: 0.8125rem;
        color: #2594D9;
        opacity: 0.5;
        font-weight: 400;
        letter-spacing: 0.1em;
      }

      /* Responsive */
      @media (max-width: 640px) {
        body {
          padding: 1.5rem;
        }

        .logo {
          margin-bottom: 1.5rem;
        }

        .subtitle {
          margin-bottom: 1rem;
        }

        .description {
          margin-bottom: 2rem;
        }

        .loading-container {
          margin-bottom: 2rem;
        }

        .footer {
          bottom: 1.5rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="glow-orb"></div>
    
    <div class="container">
      <h1 class="logo">Quilora</h1>
      
      <p class="subtitle">A new version is coming soon</p>
      
      <p class="description">
        QuoteQuest is evolving into Quilora. Launching April 1st.
      </p>

      <div class="loading-container">
        <div class="loading-bar">
          <div class="loading-progress"></div>
        </div>
      </div>
    </div>

    <footer class="footer">
      © QUILORA
    </footer>
  </body>
</html>
